<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMZ Hair Salon</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <header style="justify-content: center;">
        <img style="width: 20%; display: block; margin: 0 auto;"
            src="{{ url_for('static', filename='src/dragonminez_big_logo.png') }}" alt="Logo">
        <h1>Hair Salon</h1>
        <p>Explore and share Dragon Mine Z hairstyles</p>
    </header>

    <main>
        <section id="hair-section">
            <button id="upload-button" onclick="location.href='{{ url_for('upload') }}'"
                style="margin-bottom: 1%;">Añadir</button>
            <table id="hair-table">
                <thead>
                    <tr>
                        <th>Preview</th>
                        <th>Name</th>
                        <th>Author</th>
                        <th>Code</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="hair-list-body">
                    {% for hair in hairs %}
                    <tr>
                        <td class="col-preview"><img src="{{ url_for('static', filename='src/hair_preview.png') }}"
                                alt="Preview"></td>
                        <td class="col-name">{{ hair.name }}</td>
                        <td class="col-author">{{ hair.user.username }}</td>
                        <td class="col-code">
                            <textarea readonly class="table-code">{{ hair.code }}</textarea>
                        </td>
                        <td class="col-actions">
                            <div class="row-buttons">
                                <button class="btn-copy" title="Copy Code"><i class="fas fa-copy"></i></button>
                                <button class="btn-view" title="See 3D"><i class="fas fa-eye"></i></button>
                            </div>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </section>
    </main>

    <footer>

    </footer>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {

            document.querySelectorAll('#hair-list-body tr').forEach(row => {

                const code = row.querySelector('.table-code').value;

                const viewBtn = row.querySelector('.btn-view');
                const copyBtn = row.querySelector('.btn-copy');

                viewBtn.addEventListener('click', () => {
                    localStorage.setItem('selectedHairCode', code);
                    window.location.href = '/viewer';
                });

                copyBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    navigator.clipboard.writeText(code);
                    alert('Code copied!');
                });

            });

        });



        function openViewer(hair) {
            localStorage.setItem('selectedHairCode', hair.code);
            window.location.href = '/viewer';
        }
    </script>
</body>

</html>
