<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hair Viewer - DMZ Hair Salon</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>
    <div id="viewer-container">

    </div>

    <div id="form-switcher" style="display: none;">
        <button id="prev-form"><i class="fas fa-arrow-left"></i></button>
        <span id="current-form-label">base</span>
        <button id="next-form"><i class="fas fa-arrow-right"></i></button>
    </div>

    <div id="controls">
        <button id="back-btn" onclick="window.location.href='/'">Back to List</button>
        <div class="code-display">
            <h3>Hair Code</h3>
            <textarea id="hair-code" placeholder="Paste DMZ4 code here..."></textarea>
            <div class="button-group">
                <button id="render-btn">Render</button>
                <button id="copy-btn">Copy</button>
            </div>
        </div>
    </div>

    <div id="debug-panel">
        <h3>Debug</h3>
        <label for="head-y-slider">Y Offset: <span id="head-y-value">0.250</span></label>
        <input type="range" id="head-y-slider" min="-0.5" max="0.5" step="0.001" value="0.250">

        <label for="head-w-slider">Ancho: <span id="head-w-value">1.000</span></label>
        <input type="range" id="head-w-slider" min="0.5" max="1.5" step="0.001" value="1.0">

        <label for="head-h-slider">Alto: <span id="head-h-value">1.000</span></label>
        <input type="range" id="head-h-slider" min="0.5" max="1.5" step="0.001" value="1.0">

        <label for="head-d-slider">Prof.: <span id="head-d-value">1.000</span></label>
        <input type="range" id="head-d-slider" min="0.5" max="1.5" step="0.001" value="1.0">


    </div>

    <script src="{{ url_for('static', filename='js/hair_decoder.js') }}"></script>
    <script src="{{ url_for('static', filename='js/nbt_reader.js') }}"></script>
    <script src="{{ url_for('static', filename='js/renderer.js') }}"></script>
</body>

</html>
